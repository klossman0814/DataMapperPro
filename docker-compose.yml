services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datamapperpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: development
    command: >
      sh -c "npx prisma generate && npx prisma db push && npm run start:dev"
    ports:
      - "3002:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/datamapperpro
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-datamapper-pro-secret-change-in-prod}
      JWT_EXPIRATION: 24h
      PORT: 3001
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/output
      CORS_ORIGIN: http://localhost:5175
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      - ./backend/package.json:/app/package.json
      - backend_node_modules:/app/node_modules
      - uploads_data:/app/uploads
      - output_data:/app/output

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: development
    ports:
      - "5175:5173"
    environment:
      VITE_API_URL: http://localhost:3002
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  uploads_data:
  output_data:
  backend_node_modules:
  frontend_node_modules:
